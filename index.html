<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoVault — مشاركة فيديو</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    /* نفس الستايل السابق - احتفظ به كما هو */
    :root {
      --bg: #04060f;
      --glass: rgba(255,255,255,0.04);
      --glass-b: rgba(255,255,255,0.08);
      --accent: #00d4ff;
      --glow: rgba(0,212,255,0.25);
      --purple: #8b5cf6;
      --text: #f0f6fc;
      --muted: #7d8590;
      --success: #39d353;
      --red: #ff4d4d;
    }
    /* ... أكمل باقي الستايل من الكود السابق ... */
  </style>
</head>
<body>
  <!-- نفس الهيكل السابق -->
  
  <script>
    // ⚠️ غير هذا الرابط إلى رابط سيرفرك على Render
    const YOUR_RENDER_SERVER = 'https://your-server-name.onrender.com';
    
    // إعدادات PeerJS لـ Render
    const PEER_CONFIG = {
      config: { 
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' },
          { urls: 'stun:stun3.l.google.com:19302' }
        ] 
      },
      host: YOUR_RENDER_SERVER.replace('https://', '').replace('http://', ''),
      port: 443,
      secure: true,
      path: '/',
      debug: 3
    };

    let peer = null, sendConn = null;
    let videoFile = null, videoBlob = null;
    let chunks = [], totalSize = 0, receivedSize = 0;
    let fileType = 'video/mp4', fileName = '';
    let lastUpd = { t:0, b:0 };
    const CHUNK = 65536;
    
    // دالة لاختبار اتصال السيرفر قبل البدء
    async function testServerConnection() {
      try {
        const response = await fetch(YOUR_RENDER_SERVER + '/peerjs/id');
        const data = await response.text();
        console.log('✅ Server is awake:', data);
        return true;
      } catch(e) {
        console.error('❌ Server not responding:', e);
        alert('السيرفر غير متصل. انتظر 30 ثانية وجرب مرة أخرى.\n\nتلميح: افتح ' + YOUR_RENDER_SERVER + ' في المتصفح أولاً');
        return false;
      }
    }

    /* ─────────────────────────────────────────
       Navigation
    ───────────────────────────────────────── */
    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    
    function goHome() {
      if(peer){ 
        try{ peer.destroy(); } catch(e){}
        peer = null; 
      }
      if(sendConn) {
        try { sendConn.close(); } catch(e) {}
        sendConn = null;
      }
      chunks = []; totalSize = 0; receivedSize = 0;
      videoBlob = null; videoFile = null;
      
      document.getElementById('send-s1').style.display = 'block';
      document.getElementById('send-s2').style.display = 'none';
      document.getElementById('send-prog').style.display = 'none';
      document.getElementById('send-done').style.display = 'none';
      
      document.getElementById('recv-s1').style.display = 'block';
      document.getElementById('recv-s2').style.display = 'none';
      
      show('screen-landing');
    }
    
    function startSend() { 
      show('screen-send'); 
    }
    
    function startReceive() { 
      show('screen-receive'); 
    }

    /* ─────────────────────────────────────────
       SEND
    ───────────────────────────────────────── */
    async function onFileSelected(e) {
      const file = e.target.files[0];
      if(!file) return;
      
      // اختبار اتصال السيرفر أولاً
      const serverOk = await testServerConnection();
      if(!serverOk) {
        document.getElementById('send-s1').style.display = 'block';
        return;
      }
      
      videoFile = file;
      fileName  = file.name;
      fileType  = file.type || 'video/mp4';
      totalSize = file.size;

      document.getElementById('send-s1').style.display = 'none';
      document.getElementById('send-s2').style.display = 'block';
      document.getElementById('s-fname').textContent = file.name;
      document.getElementById('s-fsize').textContent = fmtSize(file.size);
      document.getElementById('peer-code').textContent = 'جارٍ الاتصال بالسيرفر…';

      if(peer) {
        try { peer.destroy(); } catch(e) {}
      }
      
      peer = new Peer(PEER_CONFIG);

      peer.on('open', id => {
        console.log('📤 Sender ID:', id);
        document.getElementById('peer-code').textContent = id;
        setSendStatus('waiting', 'في انتظار اتصال الجهاز الثاني… شارك الكود أعلاه');
      });

      peer.on('connection', conn => {
        console.log('📤 Connected to receiver');
        sendConn = conn;
        setSendStatus('ok', '✅ متصل! جارٍ تجهيز الإرسال…');
        document.getElementById('send-prog').style.display = 'block';
        
        conn.on('open', () => sendFile(conn));
        
        conn.on('error', err => {
          console.error('Connection error:', err);
          setSendStatus('err', 'خطأ: ' + err.message);
        });
      });

      peer.on('error', err => {
        console.error('Peer error:', err);
        
        if(err.type === 'server-error') {
          setSendStatus('err', 'السيرفر نائم. انتظر 30 ثانية وجرب مرة أخرى');
        } else if(err.type === 'peer-unavailable') {
          setSendStatus('err', 'الكود غير صحيح أو منتهي الصلاحية');
        } else {
          setSendStatus('err', 'خطأ: ' + (err.message || err.type));
        }
      });
    }

    async function sendFile(conn) {
      conn.send(JSON.stringify({ 
        t: 'meta', 
        name: videoFile.name, 
        size: videoFile.size, 
        ft: videoFile.type || 'video/mp4' 
      }));
      
      await sleep(200);

      let offset = 0;
      lastUpd = { t: Date.now(), b: 0 };
      
      setSendStatus('ok', '🚀 جارٍ إرسال الفيديو...');

      const sendNextChunk = () => {
        if(offset >= videoFile.size) {
          conn.send(JSON.stringify({ t: 'done' }));
          document.getElementById('send-prog').style.display = 'none';
          document.getElementById('send-status').style.display = 'none';
          document.getElementById('send-done').style.display = 'block';
          return;
        }
        
        if(!conn || !conn.dataChannel || conn.dataChannel.readyState !== 'open') {
          setSendStatus('err', 'انقطع الاتصال');
          return;
        }
        
        if(conn.dataChannel.bufferedAmount > 2 * 1024 * 1024) {
          return setTimeout(sendNextChunk, 80);
        }
        
        const slice = videoFile.slice(offset, offset + CHUNK);
        const fr = new FileReader();
        
        fr.onload = ev => {
          try {
            conn.send(ev.target.result);
            offset += CHUNK;
            updSendProg(Math.min(offset, videoFile.size));
            sendNextChunk();
          } catch(e) {
            setSendStatus('err', 'خطأ في الإرسال');
          }
        };
        
        fr.readAsArrayBuffer(slice);
      };
      
      sendNextChunk();
    }

    function updSendProg(sent) {
      const pct = (sent / totalSize * 100).toFixed(1);
      document.getElementById('s-bar').style.width = pct + '%';
      document.getElementById('s-pct').textContent = Math.round(pct) + '%';
      document.getElementById('s-sent').textContent = fmtSize(sent);
      
      const now = Date.now();
      const elapsed = (now - lastUpd.t) / 1000;
      
      if(elapsed > 1) {
        const spd = (sent - lastUpd.b) / elapsed;
        document.getElementById('s-spd').textContent = fmtSize(spd) + '/ث';
        const remaining = totalSize - sent;
        document.getElementById('s-eta').textContent = fmtTime(remaining / Math.max(spd, 1));
        lastUpd = { t: now, b: sent };
      }
    }

    function setSendStatus(type, txt) {
      const el = document.getElementById('send-status');
      el.className = 'status ' + type;
      document.getElementById('send-status-txt').textContent = txt;
    }

    /* ─────────────────────────────────────────
       RECEIVE
    ───────────────────────────────────────── */
    async function connectToPeer() {
      const code = document.getElementById('code-input').value.trim();
      if(!code) { 
        alert('الرجاء إدخال الكود أولاً'); 
        return; 
      }

      // اختبار اتصال السيرفر أولاً
      const serverOk = await testServerConnection();
      if(!serverOk) return;

      document.getElementById('recv-s1').style.display = 'none';
      document.getElementById('recv-s2').style.display = 'block';
      document.getElementById('r-loader').style.display = 'block';
      document.getElementById('r-prog').style.display = 'none';
      document.getElementById('r-player').style.display = 'none';
      document.getElementById('r-title').textContent = 'جارٍ الاتصال…';
      document.getElementById('r-sub').textContent = 'يرجى الانتظار';

      if(peer) {
        try { peer.destroy(); } catch(e) {}
      }

      peer = new Peer(PEER_CONFIG);

      peer.on('open', () => {
        console.log('📥 Receiver ID:', peer.id);
        document.getElementById('r-title').textContent = 'جارٍ الاتصال بالمرسل…';
        
        const conn = peer.connect(code, { 
          reliable: true,
          serialization: 'binary'
        });

        conn.on('open', () => {
          console.log('📥 Connected to sender!');
          document.getElementById('r-title').textContent = '✅ متصل! في انتظار الفيديو…';
          document.getElementById('r-sub').textContent = 'لا تغلق هذه الصفحة';
        });

        conn.on('data', d => handleData(d));

        conn.on('error', err => {
          console.error('Connection error:', err);
          document.getElementById('r-title').textContent = '❌ حدث خطأ';
          document.getElementById('r-sub').textContent = err.message;
          document.getElementById('r-loader').style.display = 'none';
        });
      });

      peer.on('error', err => {
        console.error('Peer error:', err);
        
        if(err.type === 'server-error') {
          document.getElementById('r-title').textContent = '❌ السيرفر غير متصل';
          document.getElementById('r-sub').textContent = 'انتظر 30 ثانية وجرب مرة أخرى';
        } else if(err.type === 'peer-unavailable') {
          document.getElementById('r-title').textContent = '❌ الكود غير صحيح';
          document.getElementById('r-sub').textContent = 'تأكد من الكود ومن أن المرسل ما زال منتظراً';
        } else {
          document.getElementById('r-title').textContent = '❌ خطأ';
          document.getElementById('r-sub').textContent = err.message || err.type;
        }
        document.getElementById('r-loader').style.display = 'none';
      });
    }

    function handleData(data) {
      if(typeof data === 'string') {
        try {
          const m = JSON.parse(data);
          if(m.t === 'meta') {
            chunks = []; 
            receivedSize = 0;
            totalSize = m.size; 
            fileType = m.ft; 
            fileName = m.name;
            lastUpd = { t: Date.now(), b: 0 };
            
            document.getElementById('r-loader').style.display = 'none';
            document.getElementById('r-prog').style.display = 'block';
            document.getElementById('r-fname').textContent = m.name;
            document.getElementById('r-fsize').textContent = fmtSize(m.size);
            document.getElementById('r-title').textContent = '📥 جارٍ استقبال الفيديو…';
          } else if(m.t === 'done') {
            assemble();
          }
        } catch(e) {}
      } else if(data instanceof ArrayBuffer) {
        chunks.push(data);
        receivedSize += data.byteLength;
        updRecvProg(receivedSize);
      }
    }

    function updRecvProg(rcv) {
      const pct = (rcv / totalSize * 100).toFixed(1);
      document.getElementById('r-bar').style.width = pct + '%';
      document.getElementById('r-pct').textContent = Math.round(pct) + '%';
      document.getElementById('r-rcv').textContent = fmtSize(rcv);
      
      const now = Date.now();
      const elapsed = (now - lastUpd.t) / 1000;
      
      if(elapsed > 1) {
        const spd = (rcv - lastUpd.b) / elapsed;
        document.getElementById('r-spd').textContent = fmtSize(spd) + '/ث';
        const remaining = totalSize - rcv;
        document.getElementById('r-eta').textContent = fmtTime(remaining / Math.max(spd, 1));
        lastUpd = { t: now, b: rcv };
      }
    }

    function assemble() {
      videoBlob = new Blob(chunks, { type: fileType });
      const url = URL.createObjectURL(videoBlob);
      
      document.getElementById('r-prog').style.display = 'none';
      document.getElementById('r-player').style.display = 'block';
      document.getElementById('r-title').textContent = '🎉 تم الاستقبال بنجاح!';
      document.getElementById('r-sub').textContent = 'جودة أصلية — بدون أي ضغط';
      
      const v = document.getElementById('vid');
      v.src = url;
      v.load();
    }

    function dlVideo() {
      if(!videoBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(videoBlob);
      a.download = fileName || 'video.mp4';
      a.click();
    }

    /* ─────────────────────────────────────────
       Helpers
    ───────────────────────────────────────── */
    function copyCode() {
      const code = document.getElementById('peer-code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const b = document.getElementById('copy-btn');
        b.innerHTML = '✅ تم النسخ!';
        setTimeout(() => b.innerHTML = '📋 نسخ الكود', 2000);
      });
    }

    function fmtSize(b) {
      if(b < 1024) return b + ' B';
      if(b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      if(b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
      return (b / 1073741824).toFixed(2) + ' GB';
    }

    function fmtTime(s) {
      if(isNaN(s) || !isFinite(s)) return '--';
      if(s < 60) return Math.round(s) + ' ث';
      if(s < 3600) return Math.round(s / 60) + ' د';
      return Math.round(s / 3600) + ' س';
    }

    function sleep(ms) { 
      return new Promise(r => setTimeout(r, ms)); 
    }

    /* ── Drag & drop ── */
    const dz = document.getElementById('dropzone');
    if(dz) {
      dz.addEventListener('dragover', e => {
        e.preventDefault(); 
        dz.classList.add('drag-over');
      });
      
      dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
      
      dz.addEventListener('drop', e => {
        e.preventDefault(); 
        dz.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if(f && f.type.startsWith('video/')) {
          onFileSelected({ target: { files: [f] } });
        }
      });
    }
  </script>
</body>
</html>
